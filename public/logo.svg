<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 470" fill="none">
  <defs>
    <clipPath id="porthole"><circle cx="210" cy="180" r="116"/></clipPath>
  </defs>

  <!-- door latch -->
  <rect x="50" y="150" width="44" height="60" rx="12" fill="#647B8C" stroke="#1B2430" stroke-width="4"/>
  <circle cx="73" cy="168" r="3.5" fill="#1B2430"/>
  <circle cx="73" cy="192" r="3.5" fill="#1B2430"/>

  <!-- porthole rings -->
