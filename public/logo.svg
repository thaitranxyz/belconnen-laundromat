  <!-- wordmark -->
  <text x="210" y="385" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="58" letter-spacing="2" fill="#1B2430">BELCONNEN</text>
  <text x="210" y="428" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="30" letter-spacing="11" fill="#D07A5C">LAUNDROMAT</text>
