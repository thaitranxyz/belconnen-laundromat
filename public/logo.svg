      <circle cx="154" cy="126" r="18"/>
      <circle cx="136" cy="164" r="11"/>
      <circle cx="168" cy="100" r="8"/>
      <circle cx="264" cy="138" r="16"/>
      <circle cx="284" cy="116" r="9"/>
    </g>
    <circle cx="148" cy="119" r="4" fill="#8FA4B3"/>
    <circle cx="258" cy="131" r="4" fill="#8FA4B3"/>
    <circle cx="186" cy="180" r="5" fill="#1B2430"/>
    <circle cx="250" cy="176" r="5" fill="#1B2430"/>

    <!-- foam / suds -->
    <path d="M88 280 Q118 268 140 280 Q163 292 186 280 Q210 268 234 280 Q258 292 282 280 Q304 270 332 280 L332 320 L88 320 Z" fill="#8FA4B3"/>
    <path d="M88 280 Q118 268 140 280 Q163 292 186 280 Q210 268 234 280 Q258 292 282 280 Q304 270 332 280" stroke="#F6F2EE" stroke-width="4" fill="none"/>
    <g fill="#F6F2EE" stroke="#1B2430" stroke-width="3">
